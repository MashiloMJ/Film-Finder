<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Film Finder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🍿 FILM FINDER</h1>

    <div class="genre-container">
      <img src="https://img.icons8.com/emoji/96/popcorn-emoji.png" alt="popcorn">

      <h2>Choose a genre:</h2>

      <select id="genres"></select>

      <button id="playBtn">Let's Play!</button>
    </div>

    <div id="movieInfo"></div>

    <div class="like-dislike">
      <button onclick="showRandomMovie()">👍 Like</button>
      <button onclick="showRandomMovie()">👎 Dislike</button>
    </div>

  </div>

<script src="moviescript.js"></script>
<script src="script.js"></script>

</body>
</html>
